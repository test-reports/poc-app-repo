name: Trigger tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  repository_dispatch:
    types: [run-tests]

jobs:
  trigger-local:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger
        run: echo "Workflow triggered via ${{ github.event_name }}"

  # Call reusable workflow in this repo; checks out test repo and runs tests.
  run-tests:
    needs: trigger-local
    if: github.event_name != 'repository_dispatch'
    uses: ./.github/workflows/run-tests-from-app.yml
    with:
      source_repo: ${{ github.repository }}
      source_event: ${{ github.event_name }}
      ref: ${{ github.ref }}
      sha: ${{ github.sha }}
      pr_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
      sender: ${{ github.actor }}
    secrets:
      repo_access_token: ${{ secrets.REPO_DISPATCH_TOKEN }}

name: Trigger tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  repository_dispatch:
    types: [run-tests]

jobs:
  trigger-local:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger
        run: echo "Workflow triggered via ${{ github.event_name }}"

  dispatch-to-cli-poc:
    runs-on: ubuntu-latest
    needs: trigger-local
    if: github.event_name != 'repository_dispatch'
    steps:
      - name: Check dispatch token
        run: |
          if [ -z "${{ secrets.REPO_DISPATCH_TOKEN }}" ]; then
            echo "::error::Secret REPO_DISPATCH_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Token is set (length hidden)."

      - name: Send repository_dispatch to cli-test-automation-poc
        env:
          TARGET_OWNER: ${{ github.repository_owner }}
          TARGET_REPO: cli-test-automation-poc
          DISPATCH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
        run: |
          URL="https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/dispatches"
          echo "Target: $URL"
          echo "Event type: run-tests"
          STATUS=$(curl -sS -w "%{http_code}" -o /tmp/dispatch_out -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $DISPATCH_TOKEN" \
            "$URL" \
            -d '{
              "event_type": "run-tests",
              "client_payload": {
                "source_repo": "${{ github.repository }}",
                "source_event": "${{ github.event_name }}",
                "ref": "${{ github.ref }}",
                "sha": "${{ github.sha }}",
                "pr_number": "${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}",
                "sender": "${{ github.actor }}"
              }
            }')
          echo "Response HTTP status: $STATUS"
          if [ "$STATUS" = "204" ]; then
            echo "::notice title=Dispatch accepted::repository_dispatch was accepted by GitHub. Check $TARGET_OWNER/$TARGET_REPO Actions for the triggered workflow."
          else
            echo "::error::Dispatch failed with HTTP $STATUS. Check token, repo name, and that the token has access to $TARGET_OWNER/$TARGET_REPO."
            cat /tmp/dispatch_out
            exit 1
          fi

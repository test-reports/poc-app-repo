# Reusable workflow: run tests from app repo. Lives in poc-app-repo; checkout runs in test repo (cli-test-automation-poc).
name: Run tests from app

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_event:
        required: true
        type: string
      ref:
        required: true
        type: string
      sha:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      sender:
        required: false
        type: string
        default: ""
      # Repository to checkout (where test code lives). Caller can override.
      repository:
        required: false
        type: string
        default: "test-reports/cli-test-automation-poc"
    secrets:
      # Token with read access to the repository above (for checkout). Required if repo is private.
      repo_access_token:
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Triggering CLI tests in test repo
        run: |
          echo "::notice::Triggering CLI tests in test repo"
          echo "Test repo (checkout): ${{ inputs.repository }}"
          echo "Source (trigger): ${{ inputs.source_repo }} | event: ${{ inputs.source_event }} | ref: ${{ inputs.ref }}"

      - name: Log trigger context
        run: |
          echo "::group::Trigger context (from app repo)"
          echo "source_repo: ${{ inputs.source_repo }}"
          echo "source_event: ${{ inputs.source_event }}"
          echo "ref: ${{ inputs.ref }}"
          echo "sha: ${{ inputs.sha }}"
          echo "pr_number: ${{ inputs.pr_number }}"
          echo "sender: ${{ inputs.sender }}"
          echo "::endgroup::"

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: main
          token: ${{ secrets.repo_access_token }}

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "::notice::Executing tests from ${{ inputs.source_repo }}"
          mkdir -p reports
          .venv/bin/pytest -v --tb=short --html=reports/report.html --self-contained-html
      - name: Write CLI test dashboard summary
        run: |
          python - << 'PY'
          import os
          from pathlib import Path
          from utils.cli_dashboard import _infer_counts

          report = Path("reports/report.html")
          if not report.is_file():
              raise SystemExit("reports/report.html not found; cannot build dashboard summary.")

          html = report.read_text(encoding="utf-8", errors="ignore")
          counts = _infer_counts(html)

          passed = counts.get("passed", 0)
          failed = counts.get("failed", 0)
          error = counts.get("error", 0)
          skipped = counts.get("skipped", 0)
          total = counts.get("total", 0)
          raw_total = counts.get("raw_total", total)
          summary_total = counts.get("summary_total", total)
          inconsistent = counts.get("summary_inconsistent", False)

          # GitHub Pages dashboard URL for the CLI test repo (project site)
          owner = os.environ.get("GITHUB_REPOSITORY_OWNER") or (os.environ.get("GITHUB_REPOSITORY", "").split("/")[0] if os.environ.get("GITHUB_REPOSITORY") else "")
          pages_url = f"https://{owner}.github.io/cli-test-automation-poc/" if owner else ""

          lines = []
          lines.append("### CLI test dashboard summary (test repo)")
          lines.append("")
          lines.append(f"- **Total tests**: {total}")
          lines.append(f"- **Passed**: {passed}")
          lines.append(f"- **Failed**: {failed}")
          lines.append(f"- **Error**: {error}")
          lines.append(f"- **Skipped**: {skipped}")
          if inconsistent and summary_total != raw_total:
              lines.append("")
              lines.append(f"> ⚠️ Detected mismatch between pytest summary ({summary_total} tests) and HTML table count ({raw_total}). Showing pytest summary numbers above.")
          if pages_url:
              lines.append("")
              lines.append(f"- **GitHub Pages dashboard (test repo)**: {pages_url}")
          lines.append("")
          lines.append("_Rendered from `reports/report.html` in the test repo._")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")
          PY
